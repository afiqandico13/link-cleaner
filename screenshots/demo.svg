<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f3"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="56" text-anchor="middle" font-size="34" font-weight="700" fill="#1a1a1f" letter-spacing="-0.5">Link Cleaner strips trackers before you click</text>
  <text x="600" y="86" text-anchor="middle" font-size="16" fill="#6b6b73">88 tracking params · zero data collection · Chrome / Edge / Brave / Firefox / Safari</text>

  <!-- Browser chrome (mock) -->
  <g transform="translate(60, 130)" filter="url(#shadow)">
    <rect width="1080" height="470" rx="12" fill="#ffffff" stroke="#e3e3e6" stroke-width="1"/>

    <!-- Tab bar -->
    <rect width="1080" height="44" rx="12" fill="#f7f7f8"/>
    <rect y="34" width="1080" height="10" fill="#f7f7f8"/>
    <circle cx="22" cy="22" r="5" fill="#ff5f57"/>
    <circle cx="42" cy="22" r="5" fill="#febc2e"/>
    <circle cx="62" cy="22" r="5" fill="#28c840"/>
    <rect x="100" y="10" width="280" height="24" rx="6" fill="#ffffff" stroke="#e3e3e6"/>
    <text x="120" y="26" font-size="13" fill="#6b6b73">news.ycombinator.com</text>

    <!-- Address bar with cleaned URL -->
    <rect x="100" y="58" width="880" height="36" rx="8" fill="#ffffff" stroke="#d0d0d4"/>
    <text x="118" y="80" font-size="13" fill="#1a1a1f" font-family="ui-monospace, monospace">https://news.ycombinator.com/item?id=42424242</text>
    <!-- shield badge in address bar -->
    <g transform="translate(950, 64)">
      <rect width="36" height="24" rx="6" fill="#6d28d9"/>
      <text x="18" y="17" text-anchor="middle" font-size="13" font-weight="700" fill="white">3</text>
    </g>

    <!-- Page content -->
    <g transform="translate(40, 120)">
      <text x="0" y="20" font-size="22" font-weight="700" fill="#1a1a1f">Top stories</text>
      <g transform="translate(0, 50)" font-size="14" fill="#1a1a1f">
        <text y="0">1. <tspan fill="#6d28d9" text-decoration="underline">Show HN: A privacy-first URL cleaner</tspan></text>
        <text x="0" y="20" font-size="11" fill="#6b6b73">  142 points by afiqandico 4 hours ago  |  67 comments</text>

        <text x="0" y="56">2. <tspan fill="#6d28d9" text-decoration="underline">Ask HN: What's your favorite extension?</tspan></text>
        <text x="0" y="76" font-size="11" fill="#6b6b73">  89 points by dev42 8 hours ago  |  32 comments</text>

        <text x="0" y="112">3. <tspan fill="#6d28d9" text-decoration="underline">The state of web tracking in 2026</tspan></text>
        <text x="0" y="132" font-size="11" fill="#6b6b73">  67 points by privacyfan yesterday  |  21 comments</text>
      </g>
    </g>

    <!-- "Before/after" callout (showing what was stripped) -->
    <g transform="translate(700, 200)">
      <rect width="340" height="220" rx="12" fill="#f7f7f8" stroke="#e3e3e6"/>
      <text x="170" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#6b6b73">CLEANED ON THIS PAGE</text>
      <g transform="translate(20, 50)">
        <text x="0" y="0" font-size="11" fill="#6b6b73">Original (3 links had trackers):</text>
        <g transform="translate(0, 18)" font-family="ui-monospace, monospace" font-size="10" fill="#dc2626">
          <text y="0">?utm_source=hackernews</text>
          <text y="14">&amp;utm_medium=email</text>
          <text y="28">&amp;fbclid=IwAR04A8b</text>
        </g>
        <text x="0" y="80" font-size="11" fill="#059669">✓ 3 trackers stripped from 3 links</text>
        <text x="0" y="100" font-size="11" fill="#059669">✓ 9 params removed total</text>
        <g transform="translate(0, 115)">
          <rect width="120" height="28" rx="6" fill="#6d28d9"/>
          <text x="60" y="19" text-anchor="middle" font-size="12" font-weight="600" fill="white">Open cleaned →</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Footer stats strip -->
  <g transform="translate(60, 630)">
    <text x="0" y="0" font-size="13" fill="#6b6b73">Last 7 days:</text>
    <g transform="translate(0, 12)">
      <rect width="1080" height="40" rx="6" fill="#ffffff" stroke="#e3e3e6"/>
      <g transform="translate(20, 8)" font-family="ui-monospace, monospace" font-size="9" fill="#6b6b73">
        <text x="20" y="10">Mon</text>
        <text x="120" y="10">Tue</text>
        <text x="220" y="10">Wed</text>
        <text x="320" y="10">Thu</text>
        <text x="420" y="10">Fri</text>
        <text x="520" y="10">Sat</text>
        <text x="620" y="10">Sun</text>
      </g>
      <!-- bars -->
      <rect x="14" y="14" width="14" height="12" fill="#6d28d9" rx="2"/>
      <rect x="34" y="14" width="14" height="8" fill="#a78bfa" rx="2"/>
      <rect x="114" y="14" width="14" height="20" fill="#6d28d9" rx="2"/>
      <rect x="134" y="14" width="14" height="14" fill="#a78bfa" rx="2"/>
      <rect x="214" y="10" width="14" height="16" fill="#6d28d9" rx="2"/>
      <rect x="234" y="14" width="14" height="10" fill="#a78bfa" rx="2"/>
      <rect x="314" y="6" width="14" height="20" fill="#6d28d9" rx="2"/>
      <rect x="334" y="10" width="14" height="14" fill="#a78bfa" rx="2"/>
      <rect x="414" y="12" width="14" height="14" fill="#6d28d9" rx="2"/>
      <rect x="434" y="14" width="14" height="10" fill="#a78bfa" rx="2"/>
      <rect x="514" y="8" width="14" height="18" fill="#6d28d9" rx="2"/>
      <rect x="534" y="12" width="14" height="12" fill="#a78bfa" rx="2"/>
      <rect x="614" y="14" width="14" height="12" fill="#6d28d9" rx="2"/>
      <rect x="634" y="14" width="14" height="8" fill="#a78bfa" rx="2"/>
    </g>
  </g>
</svg>