<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="pop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f7f8"/>
    </linearGradient>
    <filter id="shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dx="0" dy="6"/><feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="#e3e3e6"/>
  <rect x="200" y="50" width="380" height="490" rx="14" fill="url(#pop)" stroke="#d0d0d4" filter="url(#shadow)"/>

  <!-- Header -->
  <g transform="translate(220, 75)">
    <text x="0" y="0" font-size="22">🛡️</text>
    <text x="32" y="2" font-size="17" font-weight="700" fill="#1a1a1f">Link Cleaner</text>
    <text x="32" y="22" font-size="11" fill="#6b6b73">Strip tracking params before navigation</text>
  </g>

  <!-- Toggle card -->
  <g transform="translate(220, 130)">
    <rect width="340" height="64" rx="10" fill="#f7f7f8" stroke="#e3e3e6"/>
    <text x="16" y="22" font-size="13" font-weight="600" fill="#1a1a1f">Enable cleaning</text>
    <text x="16" y="40" font-size="11" fill="#6b6b73">Apply on every page automatically</text>
    <!-- toggle ON -->
    <rect x="280" y="20" width="44" height="24" rx="12" fill="#6d28d9"/>
    <circle cx="312" cy="32" r="9" fill="white"/>
  </g>

  <!-- Current tab card -->
  <g transform="translate(220, 210)">
    <rect width="340" height="160" rx="10" fill="#f7f7f8" stroke="#e3e3e6"/>
    <text x="16" y="22" font-size="13" font-weight="600" fill="#1a1a1f">Current tab</text>

    <text x="16" y="46" font-size="10" fill="#6b6b73">ORIGINAL</text>
    <text x="16" y="62" font-size="10" font-family="ui-monospace, monospace" fill="#dc2626">https://shop.com/shoe?utm_source=ig&amp;fbclid=IwAR&amp;id=42</text>

    <text x="170" y="80" font-size="18" fill="#6b6b73">→</text>

    <text x="16" y="100" font-size="10" fill="#6b6b73">CLEANED</text>
    <text x="16" y="116" font-size="10" font-family="ui-monospace, monospace" fill="#059669">https://shop.com/shoe?id=42</text>

    <!-- removed pills -->
    <g transform="translate(16, 128)">
      <rect width="58" height="18" rx="3" fill="#d1fae5"/>
      <text x="29" y="13" text-anchor="middle" font-size="10" fill="#059669">utm_source</text>
      <rect x="62" width="42" height="18" rx="3" fill="#d1fae5"/>
      <text x="83" y="13" text-anchor="middle" font-size="10" fill="#059669">fbclid</text>
    </g>
  </g>

  <!-- Stats card -->
  <g transform="translate(220, 386)">
    <rect width="340" height="80" rx="10" fill="#f7f7f8" stroke="#e3e3e6"/>
    <text x="16" y="22" font-size="13" font-weight="600" fill="#1a1a1f">Stats</text>
    <text x="304" y="22" text-anchor="end" font-size="10" fill="#6d28d9" text-decoration="underline">Reset</text>
    <g transform="translate(20, 36)">
      <text x="60" y="22" text-anchor="middle" font-size="22" font-weight="700" fill="#6d28d9">1,247</text>
      <text x="60" y="38" text-anchor="middle" font-size="9" fill="#6b6b73">URLs cleaned</text>
      <text x="240" y="22" text-anchor="middle" font-size="22" font-weight="700" fill="#6d28d9">3,891</text>
      <text x="240" y="38" text-anchor="middle" font-size="9" fill="#6b6b73">Params removed</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="390" y="528" text-anchor="middle" font-size="10" fill="#6b6b73">⚙️ Open full settings · GitHub</text>
</svg>